syntax = "proto3";
package user.v2;

option go_package = "example.com/m/grpc-go/kafkav2/proto";

message UserRequest {
  reserved 1;
  reserved "id";
  int64 user_id = 2;
  string name = 3;
  string last_name = 4;
}

message UserResponse {
  reserved 1;
  reserved "id";
  int64 user_id = 2;
  string name = 3;
  string last_name = 4;
}
