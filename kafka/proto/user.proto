syntax = "proto3";
package user.v1;

option go_package = "example.com/m/grpc-go/greet/proto";

message UserRequest {
  int64 id = 1;
}

message UserResponse {
  int64 id = 1;
}

/*
Note:

In the Event-Driven / Kafka architecture you described earlier, adding a service is unnecessary and can be misleading.

Reason: Kafka is asynchronous, and service implies Request-Response paradigm.
 */